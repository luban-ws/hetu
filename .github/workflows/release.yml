name: Build & Release Hetu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            cmake \
            libcurl4-openssl-dev \
            libssh2-1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Hetu ${{ github.ref_name }}'
          releaseBody: |
            ## Hetu ${{ github.ref_name }}

            See the assets below to download and install Hetu for your platform.

            ### Installation
            - **macOS (Apple Silicon)**: Download the `.dmg` file (`aarch64`)
            - **macOS (Intel)**: Download the `.dmg` file (`x64`)
            - **Windows**: Download the `.msi` or `.exe` (NSIS) installer
            - **Linux**: Download the `.deb` package or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
