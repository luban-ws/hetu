<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F05032;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="512" cy="512" r="480" fill="url(#gitGradient)" filter="url(#shadow)"/>

  <!-- Main Git branch structure -->
  <!-- Central vertical line -->
  <rect x="500" y="200" width="24" height="624" fill="url(#branchGradient)" rx="12"/>

  <!-- Main horizontal branch (top) -->
  <rect x="200" y="300" width="400" height="24" fill="url(#branchGradient)" rx="12"/>

  <!-- Secondary horizontal branch (middle) -->
  <rect x="200" y="500" width="400" height="24" fill="url(#branchGradient)" rx="12"/>

  <!-- Bottom horizontal branch -->
  <rect x="200" y="700" width="400" height="24" fill="url(#branchGradient)" rx="12"/>

  <!-- Branch nodes/circles -->
  <circle cx="200" cy="312" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="400" cy="312" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="600" cy="312" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>

  <circle cx="200" cy="512" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="400" cy="512" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="600" cy="512" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>

  <circle cx="200" cy="712" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="400" cy="712" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>
  <circle cx="600" cy="712" r="32" fill="url(#gitGradient)" filter="url(#shadow)"/>

  <!-- Central main node -->
  <circle cx="512" cy="512" r="48" fill="white" filter="url(#shadow)"/>
  <circle cx="512" cy="512" r="32" fill="url(#gitGradient)"/>

  <!-- Git symbol in center -->
  <text x="512" y="530" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="white">G</text>

  <!-- Metro-style accent lines -->
  <rect x="150" y="280" width="500" height="4" fill="white" opacity="0.3" rx="2"/>
  <rect x="150" y="480" width="500" height="4" fill="white" opacity="0.3" rx="2"/>
  <rect x="150" y="680" width="500" height="4" fill="white" opacity="0.3" rx="2"/>
</svg>
